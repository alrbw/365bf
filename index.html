<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birth Flower Selection - 365 Days</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <h1 class="main-title">Select Your Birth Date</h1>
        
        <div class="control-panel">
            <label for="birth-date-picker" class="input-label">Date of Birth:</label>
            <input type="date" id="birth-date-picker" class="date-input">
        </div>

        <div class="preview-area">
            <div id="image-frame" class="image-frame">
                <img id="flower-original" src="" alt="Select a date to see your flower" class="flower-image hidden">
                <p id="placeholder-text" class="placeholder-text">Your birth flower will appear here.</p>
                
                <div id="zoom-preview-container" class="zoom-preview-container hidden">
                    <img id="flower-zoomed" src="" alt="Zoom Preview" class="flower-zoomed-image">
                </div>
            </div>
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
